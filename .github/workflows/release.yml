name: Tauri CI & Auto Release (MSI only)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      # --------------------------------------------------
      # 1. Checkout
      # --------------------------------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------
      # 2. Setup Node.js
      # --------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # --------------------------------------------------
      # 3. Setup pnpm
      # --------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # --------------------------------------------------
      # 3b. Enable Corepack (pnpm)
      # --------------------------------------------------
      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      # --------------------------------------------------
      # 4. Setup Rust
      # --------------------------------------------------
      - uses: dtolnay/rust-toolchain@stable

      # --------------------------------------------------
      # 5. Install Tauri CLI
      # --------------------------------------------------
      - name: Install Tauri CLI
        run: |
          if (Get-Command cargo-tauri -ErrorAction SilentlyContinue) {
            cargo tauri --version
            echo "✅ Tauri CLI already installed"
          } else {
            echo "⬇️ Installing Tauri CLI..."
            cargo install tauri-cli --version "^2.8" --locked
          }

      # --------------------------------------------------
      # 6. Auto bump PATCH version
      # --------------------------------------------------
      - name: Auto bump version
        id: bump
        shell: bash
        run: |
          FILE="src-tauri/tauri.conf.json"
          PACKAGE="package.json"
          CURRENT=$(jq -r '.version' "$FILE")
          IFS='.' read -r M m p <<< "$CURRENT"
          NEW="$M.$m.$((p+1))"
          jq ".version=\"$NEW\"" "$FILE" > tmp && mv tmp "$FILE"
          jq ".version=\"$NEW\"" "$PACKAGE" > tmp && mv tmp "$PACKAGE"
          echo "version=$NEW" >> $GITHUB_OUTPUT

      # --------------------------------------------------
      # 7. Commit version bump (with retry logic)
      # --------------------------------------------------
      - name: Commit version bump
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add src-tauri/tauri.conf.json package.json
          
          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit (version may have been bumped by another workflow)"
            exit 0
          fi
          
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          
          echo "🔄 Attempting to push changes..."
          for i in {1..3}; do
            echo "  Attempt $i/3"
            if git pull --rebase origin ${{ github.ref_name }}; then
              if git push; then
                echo "✅ Successfully pushed version bump"
                break
              else
                echo "⚠️ Push failed, retrying in 5 seconds..."
                sleep 5
              fi
            else
              echo "⚠️ Pull failed, retrying in 5 seconds..."
              sleep 5
            fi
            
            if [ $i -eq 3 ]; then
              echo "❌ Failed to push after 3 attempts"
              exit 1
            fi
          done

      # --------------------------------------------------
      # 8. Install dependencies
      # --------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --------------------------------------------------
      # 9. Setup Python
      # --------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --------------------------------------------------
      # 10. Setup uv
      # --------------------------------------------------
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # --------------------------------------------------
      # 11. Install Python dependencies with uv
      # --------------------------------------------------
      - name: Install Python dependencies
        shell: bash
        run: |
          cd backend
          uv sync

      # --------------------------------------------------
      # 12. Build Python backend with PyInstaller
      # --------------------------------------------------
      - name: Build backend executable
        shell: bash
        run: |
          cd backend
          uv run pyinstaller --clean --runtime-tmpdir . --name "Siribilling-backend-x86_64-pc-windows-msvc" --onefile --add-data ".env:." --add-data "utils:utils" --add-data "config:config" --add-data "logger:logger" --add-data "background_tasks:background_tasks" --add-data "routes:routes" --add-data "auth:auth" --add-data "data_access:data_access" --add-data "helpers:helpers" --add-data "notifications:notifications" --add-data "session_logging:session_logging"  main.py
          echo "✅ PyInstaller build complete"
          ls -lah dist/

      # --------------------------------------------------
      # 13. Copy backend binary to Tauri binaries
      # --------------------------------------------------
      - name: Copy backend binary to Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp backend/dist/*.exe src-tauri/binaries/
          echo "✅ Copied backend executable to src-tauri/binaries"
          ls -lah src-tauri/binaries/

      # --------------------------------------------------
      # 14. Build Tauri app (MSI only)
      # --------------------------------------------------
      - name: Build Tauri (MSI only)
        run: cargo tauri build --ci --bundles msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # --------------------------------------------------
      # 15. Debug - Show built files
      # --------------------------------------------------
      - name: Debug built files
        shell: bash
        run: |
          echo "===== MSI Bundle Directory ====="
          ls -lah src-tauri/target/release/bundle/msi/
          echo ""
          echo "===== Built MSI Files ====="
          ls src-tauri/target/release/bundle/msi/*.msi
          echo ""
          echo "===== Signature Files ====="
          ls src-tauri/target/release/bundle/msi/*.sig

      # --------------------------------------------------
      # 16. Create latest.json (MSI only)
      # --------------------------------------------------
      - name: Create latest.json
        shell: bash
        run: |
          MSI_DIR="src-tauri/target/release/bundle/msi"
          VERSION="${{ steps.bump.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="v$VERSION"
          
          MSI_FILE=$(ls "$MSI_DIR"/*.msi 2>/dev/null | head -n 1)
          if [ -z "$MSI_FILE" ]; then
            echo "❌ No MSI file found in $MSI_DIR"
            ls -la "$MSI_DIR"
            exit 1
          fi
          
          if [ ! -f "$MSI_FILE.sig" ]; then
            echo "❌ MSI signature file not found: $MSI_FILE.sig"
            exit 1
          fi
          
          MSI_NAME=$(basename "$MSI_FILE")
          MSI_SIG=$(cat "$MSI_FILE.sig")
          
          echo "📦 MSI File: $MSI_NAME"
          echo "🔗 Download URL: https://github.com/$REPO/releases/download/$TAG/$MSI_NAME"
          
          cat > "$MSI_DIR/latest.json" <<EOF
          {
            "version": "$VERSION",
            "notes": "Auto-release v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$MSI_SIG",
                "url": "https://github.com/$REPO/releases/download/$TAG/$MSI_NAME"
              }
            }
          }
          EOF
          
          echo "✅ Created latest.json:"
          cat "$MSI_DIR/latest.json"

      # --------------------------------------------------
      # 17. Create / Update GitHub Release using gh CLI
      # --------------------------------------------------
      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="v$VERSION"
          MSI_DIR="src-tauri/target/release/bundle/msi"
          MSI_FILE=$(ls "$MSI_DIR"/*.msi | head -n 1)
          SIG_FILE="$MSI_FILE.sig"
          JSON_FILE="$MSI_DIR/latest.json"

          if [ -z "$MSI_FILE" ] || [ ! -f "$MSI_FILE" ]; then
            echo "❌ MSI file missing. Directory contents:"
            ls -lah "$MSI_DIR"
            exit 1
          fi

          if [ ! -f "$SIG_FILE" ]; then
            echo "❌ Signature file missing: $SIG_FILE"
            exit 1
          fi

          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ latest.json missing: $JSON_FILE"
            exit 1
          fi

          echo "Files to upload:"
          ls -lah "$MSI_DIR"
          echo "MSI:  $MSI_FILE"
          echo "SIG:  $SIG_FILE"
          echo "JSON: $JSON_FILE"

          echo "Creating or updating release $TAG..."

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists → uploading / updating assets only"
            gh release upload "$TAG" \
              "$MSI_FILE" \
              "$SIG_FILE" \
              "$JSON_FILE" \
              --clobber
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "Auto-release $TAG\nBuilt with Tauri 2 • Next.js 16 • Python backend" \
              --latest \
              "$MSI_FILE" \
              "$SIG_FILE" \
              "$JSON_FILE"
          fi

          echo "Release page: https://github.com/${{ github.repository }}/releases/tag/$TAG"
